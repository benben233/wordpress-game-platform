<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CodePen - chipp checkbox inputs</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css"
    integrity="sha384-5sAR7xN1Nv6T6+dT2mhtzEpVJvfS3NScPQTrOxhwjIuvcA67KV2R5Jz6kr4abQsz" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body>
  <div class="u-container-layout u-container-layout-2">
    <div class="input-group mb-0">
      <label class="input-group-text" for="s">Group by</label>
      <select class="form-select" id="s" aria-label="Default select example">
        <option value="date">Release Date</option>
        <option value="owners">Popularity</option>
        <option value="reviews">Reviews</option>
      </select>
      <ul class="ks-cboxtags">
      </ul>
    </div>
    <div class="form-floating mb-3">
      <input type="search" class="form-control" id="searchInput" placeholder="s">
      <label for="searchInput">Search</label>
    </div>
  </div>
  <script>
    tags = ['Action', 'Indie', 'Free to Play', 'Adventure', 'RPG', 'Strategy', 'Multiplayer', 'Casual', 'FPS', 'Anime', 'Simulation', 'Puzzle', 'Open World', 'Early Access', 'Visual Novel']
    ul = document.querySelector('ul.ks-cboxtags')
    createTag = tag => {
      let l = document.createElement("li");
      let id = tag.toLowerCase().replaceAll(' ', '-')
      l.innerHTML = `<input hidden type="checkbox" id="${id}"><label for="${id}">${tag}</label>`
      ul.append(l)
    }
    tags.forEach(createTag)
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
