<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CodePen - chippy checkbox inputs</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css"
    integrity="sha384-5sAR7xN1Nv6T6+dT2mhtzEpVJvfS3NScPQTrOxhwjIuvcA67KV2R5Jz6kr4abQsz" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">



</head>

<body>
  <ul class="filters">
    <label>Order by</label>
    <select>
      <option value="">Release Date</option>
      <option value="owner">Popularity</option>
      <option value="reviews">Reviews</option>
    </select>
    <li>
      <button type="button" data-post-type="post" data-tag="a" data-button-label="More Posts">Recent Work</button>
    </li>
  </ul>

  <div class="container">
    <ul class="ks-cboxtags">
      <br>
    </ul>
  </div>
</body>
<script>
  tags = ['Action', 'Indie', 'Free to Play', 'Adventure', 'RPG', 'Strategy', 'Multiplayer', 'Casual', 'FPS', 'Anime', 'Simulation', 'Puzzle', 'Open World', 'Early Access', 'Visual Novel']
  ul = document.querySelector('ul.ks-cboxtags')
  createTag = tag => {
    let l = document.createElement("li");
    let id = tag.toLowerCase().replaceAll(' ', '-')
    l.innerHTML = `<input hidden type="checkbox" id="${id}"><label for="${id}">${tag}</label>`
    ul.append(l)
  }
  tags.forEach(createTag)

  // Click Handler Function
  function clickHandler() {
    var data = this.dataset;
    var inputs = document.querySelectorAll('ul.ks-cboxtags li input[type="checkbox"]:checked');
    var order = document.querySelector('select')
    tag = ''
    inputs.forEach(x => tag += x.id + ',')
    data.tag = tag
    data.meta_key = order.value
    data.orderby = order.value
    this.textContent = tag
    // Call Ajax Load More `filter` method
    //ajaxloadmore.filter('fade', 250, data);
  }

  // Get All Filter Buttons
  var buttons = document.querySelectorAll('ul.filters button');
  if (buttons) {
    // Loop each button and add click event
    [].forEach.call(buttons, function (button) {
      button.addEventListener('click', clickHandler);
    });
  }
</script>
